<!DOCTYPE html>
<html lang="en" data-theme="bluedsteel">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover" />   <!-- §M0 responsive + NO zoom (Jac): lock scale at 1:1 so the app never opens zoomed in -->
  <title>Rental Wrangler — JacTec</title>
  <meta name="description" content="Rental Wrangler — heavy-equipment rental operations for JacRentals (Sulphur, LA)." />
  <!-- App icons — the JacRentals logo for the browser tab, the iOS/Android home screen
       (Add to Home Screen), and PWA installs. PNGs in assets/ are generated from
       assets/jac-rentals-logo (4800² source) via tools/gen-app-icons. -->
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="apple-mobile-web-app-title" content="Rental Wrangler" />
  <meta name="application-name" content="Rental Wrangler" />
  <meta name="theme-color" content="#0b0c0f" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Saira+Condensed:wght@600;700;800&family=Zilla+Slab:wght@500;600;700&family=Rye&display=swap" rel="stylesheet" />
  <!-- Warm the backend before the user signs in: preconnect to the Apps Script origins so
       the first (password-gated) data call after Saddle Up skips the TLS + redirect
       handshake. The dataset itself still can't load pre-password (it's PII-gated) — this
       only warms the pipe. NB: do NOT <link rel=preload as=video> the intro here — that
       fetches the 2.4MB clip at high priority ahead of the render-blocking style.css/app.js
       and delays first paint (a long white screen before login). The intro loads on its own
       via the <video preload="auto"> element, AFTER the critical app code. -->
  <link rel="preconnect" href="https://script.google.com" crossorigin />
  <link rel="preconnect" href="https://script.googleusercontent.com" crossorigin />
  <link rel="dns-prefetch" href="https://script.google.com" />
  <!-- Cache-busting: bump ?v= on EVERY deploy so a new release loads immediately on
       desktop + mobile instead of serving a stale cached app.js/style.css (GitHub Pages
       sends max-age=600 with no per-file hashing). See CLAUDE.md → Deploy & gates. -->
  <link rel="stylesheet" href="style.css?v=20260717z" />
  <!-- Stripe.js (must load from js.stripe.com for PCI SAQ-A; card data stays in Stripe's iframe) -->
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
  <!-- The entire UI renders from state into #app (SPEC §2: state → render). -->
  <div id="app"></div>
  <div id="overlay-root"></div>
  <div id="toast" class="toast"></div>

  <!-- NO pinch-zoom (Jac): iOS Safari ignores user-scalable=no, so block its pinch
       gesture events directly. With the viewport lock + touch-action:manipulation
       (double-tap zoom), the app holds at 1:1 and never opens zoomed in. -->
  <script>
    ['gesturestart', 'gesturechange', 'gestureend'].forEach((t) =>
      document.addEventListener(t, (e) => e.preventDefault(), { passive: false }));
  </script>

  <!-- Static catalog of which fields/elements use each design rule (rulebook index). -->
  <script src="rule-usage.js?v=20260717z"></script>
  <script type="module" src="app.js?v=20260717z"></script>
  <!-- DEV ONLY (localhost): reload when Claude bumps dev-version.txt — i.e. only
       when a FINISHED, verified edit batch lands (Jac: no mid-edit reloads).
       Never runs on app.jacrentals.com. Pauses while typing in a field. -->
  <script>
    if (/^(localhost|127\.0\.0\.1)$/.test(location.hostname)) (() => {
      let seen;
      const tick = async () => {
        if (/^(INPUT|TEXTAREA)$/.test(document.activeElement?.tagName || '')) return;
        try {
          const v = await (await fetch('dev-version.txt', { cache: 'no-store' })).text();
          if (seen !== undefined && seen !== v) { location.reload(); return; }
          seen = v;
        } catch (e) { /* server momentarily down — keep polling */ }
      };
      setInterval(tick, 3000); tick();
    })();
  </script>
</body>
</html>
